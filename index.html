<body class="bg-slate-950 text-slate-100 flex flex-col min-h-screen">

  <!-- React APP 로직 자바스크립트 -->
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // =========================================================
    // 1. ICON DICTIONARY COMPONENT (외부 CDN 의존성 제거를 위한 고해상도 SVG 아이콘 세트)
    // =========================================================
    function Icon({ name, className = "w-5 h-5" }) {
      const icons = {

        pause: (

            <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />

        ),

        ),
        info: (

            <path strokeLinecap="round" strokeLinejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
            <path strokeLinecap="round" strokeLinejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        ),
        layers: (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
            <path strokeLinecap="round" strokeLinejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
          </svg>
        ),
        compass: (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
            <path strokeLinecap="round" strokeLinejoin="round" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 009 11a13.916 13.916 0 00-2.733-8.44l-.053-.09m2.733 8.44A13.912 13.912 0 0112 11c0 1.238-.162 2.438-.467 3.579m-3.44-2.04l-.054.09A13.916 13.916 0 005 11c0 3.142.946 6.064 2.564 8.5m10.703-9.571a13.912 13.912 0 01-2.733 8.44l-.053.09m2.733-8.44a13.916 13.916 0 00-2.733-8.44l-.053-.09m2.733 8.44c0 3.517-1.009 6.799-2.753 9.571m0 0L12 11" />
          </svg>
        ),
        sparkles: (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
            <path strokeLinecap="round" strokeLinejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
          </svg>
        ),
        send: (

          </svg>
        ),
        checkCircle: (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">

          </svg>
        ),

          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">

          </svg>
        ),
        battery: (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
            <path strokeLinecap="round" strokeLinejoin="round" d="M18 12h2m-2-3v6M4 9h10a2 2 0 012 2v2a2 2 0 01-2 2H4a2 2 0 01-2-2v-2a2 2 0 012-2z" />
          </svg>
        ),
        radio: (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
            <path strokeLinecap="round" strokeLinejoin="round" d="M5.05 9.336A10 10 0 1118.95 14.664M9.336 10.325a6 6 0 115.328 3.35M12 14v1m-1 3h2" />
          </svg>
        ),
        eye: (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
            <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path strokeLinecap="round" strokeLinejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          </svg>
        ),
        fileText: (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
            <path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
        ),
        github: (
          <svg className={className} fill="currentColor" viewBox="0 0 24 24">
            <path fillRule="evenodd" clipRule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.024A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.293 2.747-1.024 2.747-1.024.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.137 20.162 22 16.418 22 12c0-5.523-4.477-10-10-10z" />
          </svg>
        )
      };
      return icons[name] || null;
    }

    // =========================================================
    // 2. MAIN APPLICATION COMPONENT
    // =========================================================
    function App() {
      // --- 측량 설계 기본 변수 (Flight Survey Params) ---
      const [areaWidth, setAreaWidth] = useState(1200);   // 가로 영역 크기 (m)
      const [areaHeight, setAreaHeight] = useState(900);   // 세로 영역 크기 (m)
      const [altitude, setAltitude] = useState(150);       // 비행 고도 (m)
      const [overlapP, setOverlapP] = useState(70);        // 종중복도 (%)
      const [overlapQ, setOverlapQ] = useState(40);        // 횡중복도 (%)
      const [droneSpeed, setDroneSpeed] = useState(10);    // 드론 비행 속도 (m/s)
      const [cameraFOV, setCameraFOV] = useState(80);      // 카메라 화각 (deg)
      const [sensorRatio, setSensorRatio] = useState(1.33); // 센서 비율 (4:3)

      // --- 지도 테마 및 환경 설정 ---
      const [mapTheme, setMapTheme] = useState('satellite'); // 'satellite' | 'grid' | 'topo'
      const [viewMode, setViewMode] = useState('topDown');   // 'topDown' | 'isometric'
      const [showFootprints, setShowFootprints] = useState(true);
      const [shutterSound, setShutterSound] = useState(true);
      const [activeTab, setActiveTab] = useState('simulator'); // 'simulator' | 'checklist' | 'report' | 'formulas'

      // --- 모바일 기기 맞춤 전용 탭 컨트롤 ---
      const [mobileActiveCol, setMobileActiveCol] = useState('map'); // 'controls' | 'map' | 'ai'

      // --- 시뮬레이션 물리 기계 상태 ---
      const [isPlaying, setIsPlaying] = useState(false);
      const [simSpeed, setSimSpeed] = useState(1);
      const [dronePos, setDronePos] = useState({ x: 50, y: 50, z: 150 });
      const [currentPathIndex, setCurrentPathIndex] = useState(0);
      const [waypointProgress, setWaypointProgress] = useState(0);
      const [capturedPhotos, setCapturedPhotos] = useState([]);
      const [shutterTriggered, setShutterTriggered] = useState(false);
      
      // --- 실시간 텔레메트리 (Telemetry) ---
      const [battery, setBattery] = useState(100);
      const [signalStrength, setSignalStrength] = useState(100);
      const [flightHeading, setFlightHeading] = useState(90);

      // --- 이륙 전 사전 점검 (Pre-flight Checklist) ---
      const [checklist, setChecklist] = useState({
        photoInterpretation: false,   // ① 사진판독 이해완료
        digitalPhotogrammetry: false, // ② 수치사진측량 검토완료
        uavCalibration: false,        // ③ UAV 매핑 캘리브레이션
        pilotAppConnected: false      // ④ 3D Survey Pilot 앱 연결
      });

      // --- 대화형 AI 어시스턴트 ---
      const [aiKey, setAiKey] = useState('');
      const [chatInput, setChatInput] = useState('');
      const [chatMessages, setChatMessages] = useState([
        {
          sender: 'ai',
          text: `🛸 **3D Survey Pilot 모바일 시뮬레이터 v2.0**

스마트폰 터치 환경 및 깃허브 배포에 완전 최적화되었습니다.

하단의 **'비행 설계 🛠️'** 탭에서 비행 설계를 조절하고, **'시뮬레이터 🗺️'** 탭에서 가상 드론을 띄워 오버랩 사진을 실시간으로 채워 나가보세요! 

질문은 **'AI 조수 💬'** 탭을 통해 간편하게 해결하실 수 있습니다.`
        }
      ]);
      const [isAiLoading, setIsAiLoading] = useState(false);

      // ==========================================
      // 3. 항공사진측량학 수학 엔진
      // ==========================================
      const calculations = useMemo(() => {
        const fovRad = (cameraFOV * Math.PI) / 180;
        const groundWidth = 2 * altitude * Math.tan(fovRad / 2);
        const groundHeight = groundWidth / sensorRatio;

        const baseDistanceB = groundWidth * (1 - overlapP / 100);
        const lineSpacingW = groundHeight * (1 - overlapQ / 100);

        // GSD 계산 (가로 5472 픽셀 정밀 카메라 센서 기준)
        const gsd = (groundWidth * 100) / 5472;

        const numberOfLines = Math.max(1, Math.ceil(areaHeight / lineSpacingW) + 1);
        const photosPerLine = Math.max(1, Math.ceil(areaWidth / baseDistanceB) + 1);
        const totalPhotos = numberOfLines * photosPerLine;

        const totalDistance = (numberOfLines * areaWidth) + ((numberOfLines - 1) * lineSpacingW);
        const flightTimeSeconds = totalDistance / droneSpeed;
        const flightTimeMinutes = Math.floor(flightTimeSeconds / 60);
        const flightTimeRemainingSeconds = Math.round(flightTimeSeconds % 60);

        return {
          groundWidth: Math.round(groundWidth),
          groundHeight: Math.round(groundHeight),
          baseDistanceB: Math.round(baseDistanceB * 10) / 10,
          lineSpacingW: Math.round(lineSpacingW * 10) / 10,
          gsd: Math.round(gsd * 100) / 100,
          numberOfLines,
          photosPerLine,
          totalPhotos,
          totalDistance: Math.round(totalDistance),
          flightTimeText: `${flightTimeMinutes}분 ${flightTimeRemainingSeconds}초`,
          flightTimeSeconds
        };
      }, [areaWidth, areaHeight, altitude, overlapP, overlapQ, droneSpeed, cameraFOV, sensorRatio]);

      // ==========================================
      // 4. 자율 비행 웨이포인트(스네이크 그리드) 생성기
      // ==========================================
      const flightPath = useMemo(() => {
        const paths = [];
        const { lineSpacingW } = calculations;
        
        const marginX = 50;
        const marginY = 50;

        for (let i = 0; i < calculations.numberOfLines; i++) {
          const y = marginY + (i * lineSpacingW);
          
          if (i % 2 === 0) {
            paths.push({ x: marginX, y });
            paths.push({ x: areaWidth + marginX, y });
          } else {
            paths.push({ x: areaWidth + marginX, y });
            paths.push({ x: marginX, y });
          }
        }
        return paths;
      }, [calculations, areaWidth, areaHeight]);

      // ==========================================
      // 5. 리얼타임 드론 비행 애니메이션 루프
      // ==========================================
      useEffect(() => {
        if (!isPlaying || flightPath.length === 0) return;

        const intervalTime = 50; // ms
        const timer = setInterval(() => {
          // 실시간 배터리 방전 시뮬레이션
          setBattery(prev => {
            const dischargeRate = (0.015 * simSpeed * (droneSpeed / 10));
            const nextBattery = Math.max(0, prev - dischargeRate);
            if (nextBattery === 0) {
              setIsPlaying(false);
              playWarningBeep();
            }
            return nextBattery;
          });

          // 무선 신호 흔들림 시뮬레이션
          setSignalStrength(() => Math.round(80 + Math.random() * 20));

          setCurrentPathIndex((prevIndex) => {
            if (prevIndex >= flightPath.length - 1) {
              setIsPlaying(false);
              return prevIndex;
            }

            const startNode = flightPath[prevIndex];
            const endNode = flightPath[prevIndex + 1];

            const dx = endNode.x - startNode.x;
            const dy = endNode.y - startNode.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            // 실시간 헤딩(방향각) 계산
            const headingRad = Math.atan2(dy, dx);
            let headingDeg = Math.round((headingRad * 180) / Math.PI);
            if (headingDeg < 0) headingDeg += 360;
            setFlightHeading(headingDeg);

            const stepSize = (droneSpeed * (intervalTime / 1000)) * simSpeed;
            const newProgress = waypointProgress + (stepSize / distance);

            if (newProgress >= 1) {
              setWaypointProgress(0);
              setDronePos({ x: endNode.x, y: endNode.y, z: altitude });
              return prevIndex + 1;
            } else {
              setWaypointProgress(newProgress);
              const currentX = startNode.x + dx * newProgress;
              const currentY = startNode.y + dy * newProgress;
              setDronePos({ x: currentX, y: currentY, z: altitude });

              // 촬영 분할 (직진 비행 구간에서만 셔터 작동)
              const isStraightLine = dy === 0;
              if (isStraightLine) {
                const lastPhoto = capturedPhotos[capturedPhotos.length - 1];
                let needsCapture = false;

                if (!lastPhoto) {
                  needsCapture = true;
                } else {
                  const distanceMoved = Math.abs(currentX - lastPhoto.x);
                  if (distanceMoved >= calculations.baseDistanceB) {
                    needsCapture = true;
                  }
                }

                if (needsCapture) {
                  setShutterTriggered(true);
                  setTimeout(() => setShutterTriggered(false), 150);

                  if (shutterSound) {
                    playShutterBeep();
                  }

                  setCapturedPhotos(prev => [
                    ...prev,
                    {
                      id: Date.now() + Math.random(),
                      x: currentX,
                      y: currentY,
                      w: calculations.groundWidth,
                      h: calculations.groundHeight,
                      altitude,
                      overlapP,
                      overlapQ
                    }
                  ]);
                }
              }

              return prevIndex;
            }
          });
        }, intervalTime);

        return () => clearInterval(timer);
      }, [isPlaying, flightPath, waypointProgress, droneSpeed, simSpeed, calculations, capturedPhotos, altitude, shutterSound]);

      // Web Audio API 효과음 발생기
      const playShutterBeep = () => {
        try {
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
          gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.08);
        } catch (e) {
          console.log('Audio error:', e);
        }
      };

      const playWarningBeep = () => {
        try {
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(400, audioCtx.currentTime);
          gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.25);
        } catch (e) {
          console.log('Audio error:', e);
        }
      };

      const handleReset = () => {
        setIsPlaying(false);
        setCurrentPathIndex(0);
        setWaypointProgress(0);
        setCapturedPhotos([]);
        setBattery(100);
        if (flightPath.length > 0) {
          setDronePos({ x: flightPath[0].x, y: flightPath[0].y, z: altitude });
        }
      };

      // 파라미터 변화 시 실시간 정밀 동기화
      useEffect(() => {
        handleReset();
      }, [areaWidth, areaHeight, altitude, overlapP, overlapQ, cameraFOV]);

      // 107장 오차 매칭 자동세팅 원클릭 트리거
      const triggerAutoTuningFor107 = () => {
        setAreaWidth(1200);
        setAreaHeight(900);
        setAltitude(150);
        setOverlapP(70);
        setOverlapQ(40);
        setCameraFOV(80);
        handleReset();
